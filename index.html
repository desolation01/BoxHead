<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Blockhead: More Arenas</title>
  </head>
  <body>
    <div id="app">
      <div id="game"></div>
      <div id="hud" class="hud is-hidden">
        <div class="hud__cluster">
          <span id="hud-health">HP 100</span>
          <span id="hud-wave">Wave 1</span>
          <span id="hud-score">Score 0</span>
        </div>
        <div class="hud__cluster hud__cluster--right">
          <span id="hud-weapon">Pistol</span>
          <span id="hud-ammo">Ammo --</span>
        </div>
      </div>
      <div id="boss-hud" class="boss-hud is-hidden">
        <div class="boss-hud__label">The Block Butcher</div>
        <div class="boss-hud__bar"><div id="boss-hp-fill"></div></div>
      </div>
      <div id="spectator-bar" class="is-hidden">
        Spectating: <span id="spectator-name">-</span>
        <button id="spectator-prev">&lt;</button>
        <button id="spectator-next">&gt;</button>
      </div>
      <div id="pvp-board" class="is-hidden"></div>
      <div id="touch-controls" class="touch-controls is-hidden" aria-hidden="true">
        <div class="touch-stick touch-stick--move" data-touch-move>
          <div class="touch-stick__knob" data-touch-move-knob></div>
        </div>
        <div class="touch-actions">
          <button class="touch-weapon" type="button" data-touch-weapon aria-label="Switch weapon">Q</button>
          <div class="touch-stick touch-stick--fire" data-touch-aim>
            <div class="touch-stick__knob" data-touch-aim-knob></div>
          </div>
        </div>
      </div>
      <div id="orientation-lock" class="orientation-lock is-hidden" aria-hidden="true">
        <div class="orientation-lock__panel">
          <div class="orientation-lock__icon">ROTATE</div>
          <h1>Rotate to Landscape</h1>
          <p>Blockhead is built for wide-screen play on mobile.</p>
        </div>
      </div>
      <div id="menu" class="menu"></div>
    </div>
    <script>
      window.BOXHEAD_BUILD = "2026-05-05-force-refresh-2";

      try {
        var previousBuild = window.localStorage.getItem("boxhead-build");
        if (previousBuild && previousBuild !== window.BOXHEAD_BUILD && !window.location.search.includes("fresh=")) {
          window.localStorage.setItem("boxhead-build", window.BOXHEAD_BUILD);
          window.location.replace(window.location.pathname + "?fresh=" + encodeURIComponent(window.BOXHEAD_BUILD));
        } else {
          window.localStorage.setItem("boxhead-build", window.BOXHEAD_BUILD);
        }
      } catch (_) {}

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
          .catch(() => {});
      }

      if ("caches" in window) {
        caches.keys()
          .then((keys) => Promise.all(keys.map((key) => caches.delete(key))))
          .catch(() => {});
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
